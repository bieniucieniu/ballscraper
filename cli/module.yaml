product:
  type: lib
  platforms: [ jvm, macosArm64, macosX64, linuxX64, linuxArm64, mingwX64 ]

settings:
  compose: enabled
  kotlin:
    serialization: enabled

dependencies:
  - com.github.ajalt.clikt:clikt:5.1.0
  - com.jakewharton.mosaic:mosaic-runtime:0.18.0
  - org.jetbrains.kotlinx:kotlinx-coroutines-core:1.11.0
  - org.jetbrains.kotlinx:kotlinx-datetime:0.8.0
  - io.ktor:ktor-client-core:3.4.3
  - io.ktor:ktor-client-cio:3.4.3
  - io.ktor:ktor-client-content-negotiation:3.4.3
  - io.ktor:ktor-serialization-kotlinx-json:3.4.3
  - net.mamoe.yamlkt:yamlkt:0.13.0
  - $kotlin.serialization.json
  - org.jetbrains.kotlinx:kotlinx-io-core:0.9.0
  - ./../lib/gitlab
  - ./../lib/jira
